<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scoop Heaven Ice Cream</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f8ff; color: #333; text-align: center; }
        header { background-color: #ff69b4; padding: 20px; color: white; }
        .flavor { margin: 20px; padding: 10px; border: 1px solid #ddd; display: inline-block; width: 200px; }
        footer { margin-top: 20px; padding: 10px; background-color: #add8e6; }

        /* Slider Styles */
        .slider { position: relative; max-width: 800px; margin: 20px auto; overflow: hidden; border-radius: 10px; }
        .slides { display: flex; transition: transform 0.5s ease; }
        .slide { min-width: 100%; height: 300px; background-size: cover; background-position: center; }
        .dots { text-align: center; margin-top: 10px; }
        .dot { display: inline-block; width: 10px; height: 10px; background: #ddd; border-radius: 50%; margin: 0 5px; cursor: pointer; }
        .dot.active { background: #ff69b4; }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Scoop Heaven!</h1>
        <p>The coolest ice cream in town.</p>
    </header>

    <!-- Image Slider Section -->
    <div class="slider">
        <div class="slides">
            <div class="slide" style="background-image: url('vanilla.jpg');"></div>
            <div class="slide" style="background-image: url('strawberry.jpg');"></div>
            <div class="slide" style="background-image: url('chocolate.jpg');"></div>
            <!-- Add more slides if needed, e.g., <div class="slide" style="background-image: url('promo.jpg');"></div> -->
        </div>
        <div class="dots">
            <span class="dot active" onclick="currentSlide(0)"></span>
            <span class="dot" onclick="currentSlide(1)"></span>
            <span class="dot" onclick="currentSlide(2)"></span>
            <!-- Add more dots if you add more slides -->
        </div>
    </div>

    <section>
        <h2>Our Flavors</h2>
        <div class="flavor">
            <img src="vanilla.jpg" alt="Vanilla Dream" style="width: 200px; height: auto;">
            <h3>Vanilla Dream</h3>
            <p>Classic vanilla with a twist of caramel.</p>
        </div>
        <div class="flavor">
            <img src="strawberry.jpg" alt="Strawberry Bliss" style="width: 200px; height: auto;">
            <h3>Strawberry Bliss</h3>
            <p>Fresh strawberries in every scoop.</p>
        </div>
        <div class="flavor">
            <img src="chocolate.jpg" alt="Chocolate Avalanche" style="width: 200px; height: auto;">
            <h3>Chocolate Avalanche</h3>
            <p>Rich chocolate with fudge chunks.</p>
        </div>
    </section>
    <footer>
        <p>Contact us at: 123 Ice Cream Lane | Hours: 10am-10pm</p>
    </footer>

    <script>
        // Slider JavaScript
        let currentIndex = 0;
        const slides = document.querySelector('.slides');
        const dots = document.querySelectorAll('.dot');

        function showSlide(index) {
            slides.style.transform = `translateX(-${index * 100}%)`;
            dots.forEach(dot => dot.classList.remove('active'));
            dots[index].classList.add('active');
        }

        function nextSlide() {
            currentIndex = (currentIndex + 1) % dots.length;
            showSlide(currentIndex);
        }

        function currentSlide(index) {
            currentIndex = index;
            showSlide(currentIndex);
        }

        // Auto-slide every 3 seconds
        setInterval(nextSlide, 3000);

        // Initialize
        showSlide(currentIndex);
    </script>
</body>
</html>
