<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scoop Heaven Ice Cream</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f8ff; color: #333; text-align: center; }
        header { background-color: #ff69b4; padding: 20px; color: white; }
        .flavor { margin: 20px; padding: 10px; border: 1px solid #ddd; display: inline-block; width: 200px; }
        footer { margin-top: 20px; padding: 10px; background-color: #add8e6; }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Scoop Heaven!</h1>
        <p>The coolest ice cream in town.</p>
    </header>
    <section>
        <h2>Our Flavors</h2>
        <div class="flavor">
            <h3>Vanilla Dream</h3>
            <p>Classic vanilla with a twist of caramel.</p>
        </div>
        <div class="flavor">
            <h3>Strawberry Bliss</h3>
            <p>Fresh strawberries in every scoop.</p>
        </div>
        <div class="flavor">
            <h3>Chocolate Avalanche</h3>
            <p>Rich chocolate with fudge chunks.</p>
        </div>
    </section>
    <footer>
        <p>Contact us at: 123 Ice Cream Lane | Hours: 10am-10pm</p>
    </footer>
</body>
</html>
